# ─────────────────────────────────────────────────────────────────────────────
# Reviews paths
# ─────────────────────────────────────────────────────────────────────────────

reviews:
  post:
    tags: [Reviews]
    summary: Submit a review
    description: >
      Student only. Can only review a booking in COMPLETED status.
      One review per booking. Automatically recalculates instructor avgRating
      and isTopRated badge.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/CreateReviewRequest'
    responses:
      '201':
        description: Review submitted
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Review'
      '400':
        description: Booking not completed or review already submitted
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

byInstructor:
  get:
    tags: [Reviews]
    summary: Get reviews for an instructor
    security: []
    parameters:
      - name: instructorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      '200':
        description: Paginated reviews
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../components/schemas.yaml#/Review'
                meta:
                  $ref: '../components/schemas.yaml#/PaginatedMeta'
