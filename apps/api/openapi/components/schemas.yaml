# ─────────────────────────────────────────────────────────────────────────────
# Shared reusable schemas for Kala API
# ─────────────────────────────────────────────────────────────────────────────

# ── Enums ────────────────────────────────────────────────────────────────────

Role:
  type: string
  enum: [STUDENT, INSTRUCTOR, ADMIN]

BookingStatus:
  type: string
  enum: [INITIATED, PAYMENT_PENDING, CONFIRMED, COMPLETED, CANCELLED]

SlotStatus:
  type: string
  enum: [AVAILABLE, RESERVED, BOOKED]

PaymentStatus:
  type: string
  enum: [PENDING, SUCCESS, FAILED, REFUNDED]

PaymentProvider:
  type: string
  enum: [STRIPE, RAZORPAY]

# ── User ─────────────────────────────────────────────────────────────────────

User:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    email:
      type: string
      format: email
    roles:
      type: array
      items:
        $ref: '#/Role'
    avatarUrl:
      type: string
      nullable: true
    isActive:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

RegisterRequest:
  type: object
  required: [name, email, password, roles]
  properties:
    name:
      type: string
    email:
      type: string
      format: email
    password:
      type: string
      minLength: 8
    roles:
      type: array
      items:
        $ref: '#/Role'
      example: [STUDENT]

LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
    password:
      type: string

AuthResponse:
  type: object
  properties:
    accessToken:
      type: string
    refreshToken:
      type: string
    user:
      $ref: '#/User'

RefreshRequest:
  type: object
  required: [refreshToken]
  properties:
    refreshToken:
      type: string

UpdateUserRequest:
  type: object
  properties:
    name:
      type: string
    avatarUrl:
      type: string

# ── Skill ────────────────────────────────────────────────────────────────────

Skill:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    slug:
      type: string
    description:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

CreateSkillRequest:
  type: object
  required: [name, slug]
  properties:
    name:
      type: string
    slug:
      type: string
    description:
      type: string

# ── Instructor Profile ────────────────────────────────────────────────────────

PortfolioItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    imageUrl:
      type: string
    caption:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

InstructorProfile:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    bio:
      type: string
    pricing:
      type: number
      format: float
    location:
      type: string
      nullable: true
    isApproved:
      type: boolean
    avgRating:
      type: number
      format: float
    isTopRated:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    user:
      $ref: '#/User'
    skills:
      type: array
      items:
        $ref: '#/Skill'
    portfolioItems:
      type: array
      items:
        $ref: '#/PortfolioItem'

InstructorSummary:
  type: object
  description: Lightweight instructor card for listing/search
  properties:
    id:
      type: string
      format: uuid
    bio:
      type: string
    pricing:
      type: number
    location:
      type: string
      nullable: true
    avgRating:
      type: number
    isTopRated:
      type: boolean
    user:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
    skills:
      type: array
      items:
        $ref: '#/Skill'

CreateInstructorProfileRequest:
  type: object
  required: [bio, pricing]
  properties:
    bio:
      type: string
    pricing:
      type: number
      format: float
    location:
      type: string

UpdateInstructorProfileRequest:
  type: object
  properties:
    bio:
      type: string
    pricing:
      type: number
      format: float
    location:
      type: string

AddPortfolioItemRequest:
  type: object
  required: [imageUrl]
  properties:
    imageUrl:
      type: string
    caption:
      type: string

# ── Slot ─────────────────────────────────────────────────────────────────────

Slot:
  type: object
  properties:
    id:
      type: string
      format: uuid
    instructorId:
      type: string
      format: uuid
    title:
      type: string
      nullable: true
    startTime:
      type: string
      format: date-time
    endTime:
      type: string
      format: date-time
    timezone:
      type: string
      example: Asia/Kolkata
    status:
      $ref: '#/SlotStatus'

CreateSlotRequest:
  type: object
  required: [startTime, endTime]
  properties:
    title:
      type: string
    startTime:
      type: string
      format: date-time
    endTime:
      type: string
      format: date-time
    timezone:
      type: string
      default: UTC

# ── Booking ───────────────────────────────────────────────────────────────────

Booking:
  type: object
  properties:
    id:
      type: string
      format: uuid
    studentId:
      type: string
      format: uuid
    instructorId:
      type: string
      format: uuid
    slotId:
      type: string
      format: uuid
    status:
      $ref: '#/BookingStatus'
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    slot:
      $ref: '#/Slot'
    payment:
      $ref: '#/Payment'
    review:
      $ref: '#/Review'

CreateBookingRequest:
  type: object
  required: [slotId, instructorId]
  properties:
    slotId:
      type: string
      format: uuid
    instructorId:
      type: string
      format: uuid

# ── Payment ───────────────────────────────────────────────────────────────────

Payment:
  type: object
  properties:
    id:
      type: string
      format: uuid
    bookingId:
      type: string
      format: uuid
    amount:
      type: number
      format: float
    status:
      $ref: '#/PaymentStatus'
    provider:
      $ref: '#/PaymentProvider'
    providerSessionId:
      type: string
      nullable: true
    transactionId:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time

CreatePaymentSessionRequest:
  type: object
  required: [bookingId, provider]
  properties:
    bookingId:
      type: string
      format: uuid
    provider:
      $ref: '#/PaymentProvider'

PaymentSessionResponse:
  type: object
  properties:
    providerSessionId:
      type: string
      description: Stripe checkout session ID or Razorpay order ID
    checkoutUrl:
      type: string
      description: Redirect URL for the hosted payment page

# ── Review ────────────────────────────────────────────────────────────────────

Review:
  type: object
  properties:
    id:
      type: string
      format: uuid
    bookingId:
      type: string
      format: uuid
    studentId:
      type: string
      format: uuid
    instructorId:
      type: string
      format: uuid
    rating:
      type: integer
      minimum: 1
      maximum: 5
    comment:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true

CreateReviewRequest:
  type: object
  required: [bookingId, rating]
  properties:
    bookingId:
      type: string
      format: uuid
    rating:
      type: integer
      minimum: 1
      maximum: 5
    comment:
      type: string

# ── Chat ──────────────────────────────────────────────────────────────────────

ChatMessage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    bookingId:
      type: string
      format: uuid
    senderId:
      type: string
      format: uuid
    content:
      type: string
    createdAt:
      type: string
      format: date-time

SendMessageRequest:
  type: object
  required: [content]
  properties:
    content:
      type: string

# ── Common ────────────────────────────────────────────────────────────────────

ErrorResponse:
  type: object
  properties:
    statusCode:
      type: integer
    message:
      type: string
    error:
      type: string

PaginatedMeta:
  type: object
  properties:
    total:
      type: integer
    page:
      type: integer
    limit:
      type: integer
