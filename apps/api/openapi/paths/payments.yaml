# ─────────────────────────────────────────────────────────────────────────────
# Payments paths
# ─────────────────────────────────────────────────────────────────────────────

session:
  post:
    tags: [Payments]
    summary: Create a payment session
    description: >
      Student only. Generates a Stripe checkout session or Razorpay order.
      Returns a checkout URL to redirect the student.
      Booking status moves to PAYMENT_PENDING.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/CreatePaymentSessionRequest'
    responses:
      '201':
        description: Payment session created
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/PaymentSessionResponse'
      '400':
        description: Booking not in INITIATED status
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

webhook:
  post:
    tags: [Payments]
    summary: Payment provider webhook
    description: >
      Receives verified webhook events from Stripe or Razorpay.
      On success: booking moves to CONFIRMED, slot marked BOOKED.
      On failure: booking stays PAYMENT_PENDING, slot reservation released.
    security: []
    parameters:
      - name: provider
        in: query
        required: true
        schema:
          $ref: '../components/schemas.yaml#/PaymentProvider'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Raw provider webhook payload
    responses:
      '200':
        description: Webhook processed
      '400':
        description: Invalid webhook signature
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

byBooking:
  get:
    tags: [Payments]
    summary: Get payment status for a booking
    parameters:
      - name: bookingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Payment record
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Payment'
      '404':
        description: Payment not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'
