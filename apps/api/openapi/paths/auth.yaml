# ─────────────────────────────────────────────────────────────────────────────
# Auth paths
# ─────────────────────────────────────────────────────────────────────────────

register:
  post:
    tags: [Auth]
    summary: Register a new user
    description: Creates a student, instructor, or both. No authentication required.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/RegisterRequest'
    responses:
      '201':
        description: User registered successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/AuthResponse'
      '409':
        description: Email already in use
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

login:
  post:
    tags: [Auth]
    summary: Login with email and password
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/LoginRequest'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/AuthResponse'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

refresh:
  post:
    tags: [Auth]
    summary: Refresh access token
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/RefreshRequest'
    responses:
      '200':
        description: New access token issued
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
      '401':
        description: Invalid or expired refresh token
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

logout:
  post:
    tags: [Auth]
    summary: Logout and invalidate refresh token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/RefreshRequest'
    responses:
      '204':
        description: Logged out successfully
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'
