# ─────────────────────────────────────────────────────────────────────────────
# Skills paths
# ─────────────────────────────────────────────────────────────────────────────

list:
  get:
    tags: [Skills]
    summary: List all skills
    security: []
    responses:
      '200':
        description: Full skills catalog
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/Skill'

  post:
    tags: [Skills]
    summary: Create a new skill
    description: Admin only.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/CreateSkillRequest'
    responses:
      '201':
        description: Skill created
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Skill'
      '409':
        description: Skill name or slug already exists
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

byId:
  delete:
    tags: [Skills]
    summary: Delete a skill
    description: Admin only. Removes skill from catalog and all instructor profiles.
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Skill deleted
      '404':
        description: Skill not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'
