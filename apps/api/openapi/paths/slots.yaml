# ─────────────────────────────────────────────────────────────────────────────
# Slots paths
# ─────────────────────────────────────────────────────────────────────────────

slots:
  post:
    tags: [Slots]
    summary: Create an availability slot
    description: Instructor only. Defines a new bookable time window.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/CreateSlotRequest'
    responses:
      '201':
        description: Slot created
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Slot'
      '409':
        description: Slot conflicts with existing slot
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'

byInstructor:
  get:
    tags: [Slots]
    summary: List available slots for an instructor
    security: []
    parameters:
      - name: instructorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: from
        in: query
        schema:
          type: string
          format: date-time
        description: Start of date range filter
      - name: to
        in: query
        schema:
          type: string
          format: date-time
        description: End of date range filter
    responses:
      '200':
        description: Available slots
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/Slot'

slotById:
  delete:
    tags: [Slots]
    summary: Delete a slot
    description: Instructor only. Can only delete AVAILABLE slots.
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Slot deleted
      '400':
        description: Cannot delete a reserved or booked slot
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'
      '404':
        description: Slot not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ErrorResponse'
